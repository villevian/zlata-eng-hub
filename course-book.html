<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Book · Identity A2–B1</title>
<style>
  :root{
    --ink:#1f2421;
    --muted:#5a6661;
    --done:#2f7d5b;
    --accent:#7a5cc9;
    --glass-bg:rgba(255,255,255,.55);
    --glass-bg-strong:rgba(255,255,255,.8);
    --glass-border:rgba(255,255,255,.7);
    --shadow:0 1px 2px rgba(31,36,33,.05),0 12px 32px rgba(31,36,33,.1);
    --radius:14px;
    --unit-blue:#1b9fd8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    color:var(--ink);
    font-family:"Iowan Old Style",Georgia,"Times New Roman",serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:url("bg.png");background-size:cover;background-position:center top;
    background-attachment:fixed;background-repeat:no-repeat;background-color:#cfe0f1;
  }
  .wrap{max-width:860px;margin:0 auto;padding:32px 20px 96px}

  .nav{
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;
    background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);
    border:1px solid var(--glass-border);border-radius:14px;padding:8px;box-shadow:var(--shadow);
  }
  .nav a{
    flex:1;text-align:center;padding:10px 12px;border-radius:10px;text-decoration:none;
    color:var(--ink);font-size:14px;font-weight:600;transition:.15s;white-space:nowrap;font-family:inherit;
  }
  .nav a:hover{background:rgba(255,255,255,.5)}
  .nav a.active{background:var(--ink);color:#fff}
  .nav a.soon{color:var(--muted);cursor:not-allowed}
  .nav a.soon:hover{background:transparent}
  .nav a.soon::after{content:" · скоро";font-size:10px;font-weight:400;opacity:.6;font-family:ui-monospace,monospace}

  .eyebrow{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--accent);margin:0 0 10px;text-shadow:0 1px 2px rgba(255,255,255,.6)}
  h1{font-size:clamp(32px,6vw,44px);line-height:1.05;margin:0 0 8px;font-weight:600;
    letter-spacing:-.015em;text-shadow:0 1px 2px rgba(255,255,255,.5)}
  .sub{color:var(--ink);margin:0 0 28px;font-size:15px;opacity:.85}

  .glass{background:var(--glass-bg-strong);backdrop-filter:blur(20px) saturate(1.4);
    -webkit-backdrop-filter:blur(20px) saturate(1.4);border:1px solid var(--glass-border);
    border-radius:var(--radius);box-shadow:var(--shadow)}

  /* revision strip between unit pairs */
  .revision{
    display:flex;flex-wrap:wrap;gap:6px 18px;align-items:center;
    background:rgba(218,240,231,.65);border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-radius:10px;padding:10px 16px;margin:6px 0 14px;
    font-size:13px;color:#2c6b54;font-weight:600;
  }
  .revision b{color:var(--accent)}

  /* unit card */
  .unit{display:block;text-decoration:none;color:inherit;margin-bottom:12px;overflow:hidden;
    transition:transform .15s, box-shadow .15s;position:relative}
  .unit:hover{transform:translateY(-2px);box-shadow:0 4px 8px rgba(31,36,33,.08),0 18px 44px rgba(31,36,33,.16)}
  .unit-head{display:flex;align-items:stretch;gap:0}
  .unit-num{
    flex:none;width:84px;background:var(--unit-blue);color:#fff;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:18px 10px;text-align:center;
  }
  .unit-num .n{font-size:34px;font-weight:700;line-height:1}
  .unit-num .t{font-size:12px;line-height:1.15;margin-top:6px;font-weight:600}
  .unit-num .p{font-family:ui-monospace,monospace;font-size:10px;opacity:.85;margin-top:6px}
  .unit-body{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
  .col{padding:14px 16px;border-left:1px solid rgba(31,36,33,.07)}
  .col:first-child{border-left:0}
  .col h4{margin:0 0 7px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--accent)}
  .col ul{margin:0;padding:0;list-style:none}
  .col li{font-size:13px;margin-bottom:3px;color:var(--ink);opacity:.9;line-height:1.35}
  .col li em{font-style:italic;opacity:.95}
  .unit-foot{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 16px;border-top:1px solid rgba(31,36,33,.07);
    font-size:12px;color:var(--muted);
  }
  .skills-line{flex:1;min-width:0}
  .skills-line span{display:inline-block;margin-right:12px;white-space:nowrap}
  .skills-line b{color:var(--ink);font-weight:600}
  .go{flex:none;font-weight:700;color:var(--accent);white-space:nowrap;margin-left:12px}
  .unit:hover .go{text-decoration:underline}

  @media (max-width:680px){
    .unit-body{grid-template-columns:1fr}
    .col{border-left:0;border-top:1px solid rgba(31,36,33,.07)}
    .col:first-child{border-top:0}
    .unit-foot{flex-direction:column;align-items:flex-start;gap:6px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav" aria-label="Разделы курса">
    <a href="course-book.html" class="active">Course Book</a>
    <a href="workbook.html" class="soon">Workbook</a>
    <a href="index.html">Check List</a>
    <a href="help.html" class="soon">Help</a>
  </nav>

  <p class="eyebrow">Identity A2–B1 · Student's Book</p>
  <h1>Course Book</h1>
  <p class="sub">12 юнитов. Нажми на юнит, чтобы открыть его внутри.</p>

  <div id="units"></div>
</div>

<script>
// Данные оглавления учебника Identity A2–B1 (страницы 6–7 Contents).
const UNITS = [
  { n:1, title:"It’s all about me!", page:"p.22",
    competences:["Talk about favourites","Describe bedrooms","Talk about possessions and appearance"],
    vocabulary:["Common nouns","Bedroom furniture","Physical appearance","<em>Strategy:</em> Mind maps"],
    grammar:["there is / there are","some & any","Prepositions of place","have got","Adjective order"],
    skills:{culture:"National stereotypes", speaking:"Making friends", rw:"Scanning for key words"} },

  { n:2, title:"Live and learn!", page:"p.32",
    competences:["Talk about routines","Talk about lifestyle","Talk about habits"],
    vocabulary:["Daily routine","Telling the time","Everyday activities"],
    grammar:["Present simple","Prepositions of time","Adverbs of frequency","Expressions of frequency"],
    skills:{culture:"Education in England", speaking:"Agreeing & disagreeing", rw:"Giving opinions"} },

  { rev:"1–2", revPages:["Summative revision p.42","Towards INVALSI p.43","Exam: Speaking Part 1 p.262","Life: Self-motivation p.274"] },

  { n:3, title:"I love it!", page:"p.44",
    competences:["Talk about free time","Talk about ability","Talk about likes and dislikes"],
    vocabulary:["Free-time activities","<em>play / do / go</em>","Personality adjectives"],
    grammar:["<em>can</em>: ability","Adverbs of manner","<em>like/love/enjoy/hate</em> + -ing"],
    skills:{culture:"A teen’s guide to London", speaking:"Making suggestions", rw:"Planning & checking writing"} },

  { n:4, title:"Look at me!", page:"p.54",
    competences:["Talk about clothes and style","Talk about what’s happening now","Talk about the present"],
    vocabulary:["Clothes and accessories","Adjectives for clothes","Shops","<em>Strategy:</em> Venn diagrams"],
    grammar:["Present continuous","Present simple vs continuous","Dynamic & stative verbs"],
    skills:{culture:"Camden Market", speaking:"In a shop", rw:"Making a first impression"} },

  { rev:"3–4", revPages:["Summative revision p.64","Towards INVALSI p.65","Exam: Reading Part 2 p.264","Life: Self-awareness p.276","CLIL Maths p.286"] },

  { n:5, title:"Food for thought!", page:"p.66",
    competences:["Talk about food and drink","Talk about quantity and diet","Talk about quantity and food"],
    vocabulary:["Food and drink","Portions and containers","Adjectives for food & drink","<em>Strategy:</em> Labelling"],
    grammar:["Countable & uncountable","some / any / no","much / many / a lot of / a few","too / enough"],
    skills:{culture:"British food and drink", speaking:"In a café", rw:"An opinion essay"} },

  { n:6, title:"We are family!", page:"p.76",
    competences:["Talk about family","Talk about the past"],
    vocabulary:["The family","Jobs (1)","Past time expressions"],
    grammar:["Past simple: <em>be</em>","Past simple: <em>can</em>","Past simple: regular verbs"],
    skills:{culture:"Henry VIII and his wives", speaking:"Describing people", rw:"A rite of passage"} },

  { rev:"5–6", revPages:["Summative revision p.86","Towards INVALSI p.87","Exam: Reading Part 4 p.266","Life: Teamwork p.278","CLIL P.E. p.288"] },

  { n:7, title:"Home sweet home!", page:"p.88",
    competences:["Talk about houses","Talk about the past"],
    vocabulary:["Parts of the house & furniture","Sequencers","<em>Strategy:</em> Learning new words"],
    grammar:["Past simple: irregular verbs","Past continuous","Past simple vs past continuous"],
    skills:{culture:"Welcome to the White House!", speaking:"Showing interest", rw:"Giving reasons"} },

  { n:8, title:"Our beautiful world", page:"p.98",
    competences:["Talk about places","Make comparisons"],
    vocabulary:["The natural world","Animals"],
    grammar:["Articles","Comparative adjectives","<em>(not) as…as</em>, <em>less than</em>","Superlative adjectives"],
    skills:{culture:"The USA, a land of extremes", speaking:"Talking about the weather", rw:"Predicting content"} },

  { rev:"7–8", revPages:["Summative revision p.108","Towards INVALSI p.109","Exam: Listening Part 4 p.268","Life: Online interaction p.280","CLIL History p.290"] },

  { n:9, title:"A bright future!", page:"p.110",
    competences:["Talk about jobs","Talk about intentions & predictions","Talk about future arrangements"],
    vocabulary:["Jobs (2)","Job characteristics","Future time expressions"],
    grammar:["<em>be going to</em>: intentions & predictions","Present continuous: future","<em>be going to</em> vs present continuous","<em>Writing:</em> Formal emails"],
    skills:{culture:"The Duke of Edinburgh’s Award", speaking:"Talking on the phone", rw:"Multiple-choice questions"} },

  { n:10, title:"In the city!", page:"p.120",
    competences:["Talk about cities","Talk about the future","Talk about real conditions"],
    vocabulary:["Places in cities","Compound nouns: cities","Adjectives for cities"],
    grammar:["<em>will</em>: predictions & facts","<em>will</em>: offers, promises, decisions","First conditional","<em>when / as soon as / unless</em>"],
    skills:{culture:"The USA: a nation of immigrants", speaking:"Asking for & giving directions", rw:"Linking words"} },

  { rev:"9–10", revPages:["Summative revision p.130","Towards INVALSI p.131","Exam: Listening P1 & Reading P6 p.270","Life: Time management p.282","CLIL Geography p.292"] },

  { n:11, title:"Sport for all", page:"p.132",
    competences:["Talk about sports","Talk about experiences"],
    vocabulary:["Sports","Sports: places & equipment","Sports: people"],
    grammar:["Present perfect","Present perfect with <em>ever / never</em>","Present perfect vs past simple"],
    skills:{culture:"Commonwealth sports", speaking:"Making arrangements", rw:"Guessing meaning from context"} },

  { n:12, title:"What a feeling!", page:"p.142",
    competences:["Talk about feelings","Talk about recent actions","Talk about social situations"],
    vocabulary:["Feelings and emotions","Interactions & expressing emotions","<em>-ed</em> and <em>-ing</em> adjectives"],
    grammar:["Present perfect with <em>just / yet / already</em>","<em>some/any/no/every</em> compounds"],
    skills:{culture:"National festivities", speaking:"Making & responding to offers", rw:"Taking turns"} },

  { rev:"11–12", revPages:["Summative revision p.152","Towards INVALSI p.153","Exam: Speaking Part 2 p.272","Life: Problem-solving p.284"] },
];

function col(title, items){
  return '<div class="col"><h4>'+title+'</h4><ul>'+
    items.map(i=>'<li>'+i+'</li>').join('')+'</ul></div>';
}

function render(){
  const root = document.getElementById("units");
  let html = "";
  UNITS.forEach(u=>{
    if(u.rev){
      html += '<div class="revision"><b>Units '+u.rev+'</b>'+
        u.revPages.map(p=>'<span>'+p+'</span>').join('')+'</div>';
      return;
    }
    html +=
      '<a class="unit glass" href="unit-'+u.n+'.html">'+
        '<div class="unit-head">'+
          '<div class="unit-num"><span class="n">'+u.n+'</span>'+
            '<span class="t">'+u.title+'</span>'+
            '<span class="p">'+u.page+'</span></div>'+
          '<div class="unit-body">'+
            col("Competences", u.competences)+
            col("Vocabulary", u.vocabulary)+
            col("Grammar", u.grammar)+
          '</div>'+
        '</div>'+
        '<div class="unit-foot">'+
          '<div class="skills-line">'+
            '<span><b>Culture:</b> '+u.skills.culture+'</span>'+
            '<span><b>Speaking:</b> '+u.skills.speaking+'</span>'+
            '<span><b>R&W:</b> '+u.skills.rw+'</span>'+
          '</div>'+
          '<div class="go">Открыть юнит →</div>'+
        '</div>'+
      '</a>';
  });
  root.innerHTML = html;
}
render();
</script>
</body>
</html>
