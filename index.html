  :root{

  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}

    color:var(--ink);

    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:url("bg.png");
    background-size:cover;
    background-position:center top;
    background-attachment:fixed;
    background-repeat:no-repeat;
    background-color:#cfe0f1;
  }
  .wrap{max-width:780px;margin:0 auto;padding:32px 20px 96px}

  /* Navigation */
  .nav{
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;
    background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);
    border:1px solid var(--glass-border);border-radius:14px;padding:8px;
    box-shadow:var(--shadow);
  }
  .nav a{
    flex:1;text-align:center;padding:10px 12px;border-radius:10px;
    text-decoration:none;color:var(--ink);font-size:14px;font-weight:600;
    letter-spacing:.01em;transition:.15s;white-space:nowrap;
    font-family:inherit;
  }
  .nav a:hover{background:rgba(255,255,255,.5)}
  .nav a.active{background:var(--ink);color:#fff}
  .nav a.soon{color:var(--muted);cursor:not-allowed}
  .nav a.soon:hover{background:transparent}
  .nav a.soon::after{
    content:" · скоро";font-size:10px;font-weight:400;opacity:.6;
    font-family:ui-monospace,monospace;letter-spacing:.05em;
  }

  /* Header / hero */
  .eyebrow{
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);margin:0 0 10px;
    text-shadow:0 1px 2px rgba(255,255,255,.6);
  }
  h1{
    font-size:clamp(32px,6vw,44px);line-height:1.05;margin:0 0 8px;
    font-weight:600;letter-spacing:-.015em;
    text-shadow:0 1px 2px rgba(255,255,255,.5);
  }
  .sub{color:var(--ink);margin:0 0 24px;font-size:15px;opacity:.85}

  /* Glass panel base */
  .glass{
    background:var(--glass-bg-strong);
    backdrop-filter:blur(20px) saturate(1.4);
    -webkit-backdrop-filter:blur(20px) saturate(1.4);
    border:1px solid var(--glass-border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  /* Progress */
  .progress{padding:18px 20px;margin-bottom:14px}
  .progress-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:10px}
  .progress-num{font-size:30px;font-weight:600;letter-spacing:-.02em}
  .progress-num small{font-size:15px;color:var(--muted);font-weight:400}
  .progress-label{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .bar{height:10px;background:rgba(255,255,255,.45);border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--done),#3a9d72);width:0;transition:width .4s ease}

  /* Connection panel */
  .conn{padding:14px 16px;margin-bottom:22px;font-size:14px;background:var(--accent-soft);border:1px solid rgba(255,255,255,.6);border-radius:var(--radius);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .conn.ok{background:var(--done-soft)}
  .conn .status{font-size:13px;color:var(--muted)}
  .conn .status b{color:var(--done)}

  /* Sections */
  .section{margin-bottom:12px;overflow:hidden}
  .section > summary{
    list-style:none;cursor:pointer;padding:16px 18px;display:flex;align-items:center;gap:12px;
    user-select:none;
  }
  .section > summary::-webkit-details-marker{display:none}
  .sec-chevron{transition:transform .2s;color:var(--muted);flex:none}
  .section[open] .sec-chevron{transform:rotate(90deg)}
  .sec-title{font-weight:600;font-size:16px;flex:1}
  .sec-count{
    font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);
    background:rgba(255,255,255,.55);padding:3px 9px;border-radius:999px;white-space:nowrap;
  }
  .section[data-complete="1"] .sec-count{background:var(--done-soft);color:var(--done)}
  .sec-body{padding:0 18px 8px}
  .group-label{
    font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--accent);margin:14px 0 6px;
  }

  /* Items */
  .item{
    display:flex;align-items:flex-start;gap:11px;padding:8px 4px;
    border-bottom:1px solid rgba(255,255,255,.4);
    cursor:pointer;
  }
  .item:last-child{border-bottom:0}
  .box{
    flex:none;width:20px;height:20px;border:2px solid rgba(31,36,33,.25);border-radius:6px;margin-top:2px;
    display:grid;place-items:center;transition:.15s;background:rgba(255,255,255,.7);
  }
  .box svg{width:12px;height:12px;opacity:0;transform:scale(.5);transition:.15s}
  .item.done .box{background:var(--done);border-color:var(--done)}
  .item.done .box svg{opacity:1;transform:scale(1)}
  .item-text{flex:1;font-size:15px}
  .item.done .item-text{color:var(--muted);text-decoration:line-through;text-decoration-color:#9aa9a3}
  .item-date{font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);opacity:0;white-space:nowrap;margin-top:4px}
  .item.done .item-date{opacity:.8}
  .item code{font-family:ui-monospace,monospace;background:rgba(255,255,255,.5);padding:1px 5px;border-radius:5px;font-size:13px}

  .saving{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:8px 16px;border-radius:999px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:5}
  .saving.show{opacity:1}
  .err{color:#b34a23;font-size:13px;margin-top:6px}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("ru-RU",{day:"2-digit",month:"2-digit",year:"2-digit"});
}

function buildDOM(){
  const root = document.getElementById("sections");
  root.innerHTML = "";
  allKeys = [];
  DATA.forEach((sec,i)=>{
    const det = document.createElement("details");
    det.className = "section glass";
    det.dataset.sec = sec.id;
    if(i < 1) det.open = true;
    const sum = document.createElement("summary");
    sum.innerHTML =
      '<span class="sec-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>'
      +'<span class="sec-title">'+sec.title+'</span>'
      +'<span class="sec-count" data-count></span>';
    det.appendChild(sum);
    const body = document.createElement("div");
    body.className = "sec-body";
    sec.groups.forEach(g=>{
      const gl = document.createElement("div");
      gl.className = "group-label";
      gl.textContent = g.label;
      body.appendChild(gl);
      g.items.forEach(([key,text])=>{
        allKeys.push(key);
        const it = document.createElement("div");
        it.className = "item";
        it.dataset.key = key;
        it.innerHTML =
          '<span class="box">'+TICK+'</span>'
          +'<span class="item-text">'+text+'</span>'
          +'<span class="item-date" data-date></span>';
        it.addEventListener("click",()=>toggle(key));
        body.appendChild(it);
      });
    });
    det.appendChild(body);
    root.appendChild(det);
  });
  render();
}

function render(){
  let done = 0;
  document.querySelectorAll(".item").forEach(it=>{
    const k = it.dataset.key;
    const s = state[k];
    const on = s && s.checked;
    it.classList.toggle("done", !!on);
    it.querySelector("[data-date]").textContent = on ? fmtDate(s.checked_at) : "";
    if(on) done++;
  });
  // per-section counts
  document.querySelectorAll(".section").forEach(det=>{
    const items = det.querySelectorAll(".item");
    let d = 0;
    items.forEach(it=>{ if(state[it.dataset.key] && state[it.dataset.key].checked) d++; });
    det.querySelector("[data-count]").textContent = d+" / "+items.length;
    det.dataset.complete = (d===items.length && items.length>0) ? "1" : "0";
  });
  const total = allKeys.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("pct").textContent = pct;
  document.getElementById("ratio").textContent = done+" / "+total;
  document.getElementById("bar-fill").style.width = pct+"%";
}

let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"),1400);
}

async function toggle(key){
  if(!sb){ toast("Сначала подключи базу"); flashConn(); return; }
  const cur = state[key] && state[key].checked;
  const next = !cur;
  const ts = next ? new Date().toISOString() : null;
  state[key] = {checked:next, checked_at:ts};   // optimistic
  render();
  const { error } = await sb.from("exam_checklist")
    .upsert({
      student_id: STUDENT_ID, item_key: key,
      checked: next, checked_at: ts, updated_at: new Date().toISOString()
    }, { onConflict: "student_id,item_key" });
  if(error){
    state[key] = {checked:cur, checked_at: cur ? (state[key].checked_at) : null}; // revert
    render();
    toast("Ошибка сохранения");
    console.error(error);
  } else {
    toast(next ? "Закрыто ✓" : "Снято");
  }
}

async function loadState(){
  const { data, error } = await sb.from("exam_checklist")
    .select("item_key,checked,checked_at")
    .eq("student_id", STUDENT_ID);
  if(error){ console.error(error); throw error; }
  (data||[]).forEach(r=>{ state[r.item_key] = {checked:r.checked, checked_at:r.checked_at}; });
  render();
}

function flashConn(){
  const c = document.getElementById("conn");
  c.hidden = false;
  c.style.outline = "2px solid var(--accent)";
  setTimeout(()=>c.style.outline="",600);
}

async function connect(url,key){
  try{
    sb = supabase.createClient(url, key);
    await loadState();
    return true;
  }catch(e){
    const c = document.getElementById("conn");
    c.hidden = false;
    document.getElementById("conn-err").textContent =
      "Нет связи с базой. Возможно, проект Supabase на паузе — зайди в дашборд и нажми Resume. ("+(e.message||e)+")";
    sb = null;
    return false;
  }
}

// init
buildDOM();
if(SUPABASE_URL && SUPABASE_KEY){
  connect(SUPABASE_URL, SUPABASE_KEY);
} else {
  const c = document.getElementById("conn");
  c.hidden = false;
  document.getElementById("conn-err").textContent =
    "Ключ базы не вписан в файл. Прогресс не сохраняется.";
}
</script>
</body>
</html>
